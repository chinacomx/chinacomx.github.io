baseURL = "https://chinacomx.github.io/"
title = "ChinaComx"
theme = "blowfish"
defaultContentLanguage = "en"

[languages]
  [languages.en]
    languageName = "EN"
    weight = 1
    title = "ChinaComx"
    description = "Comics Culture in the People's Republic of China \n\n A research project funded by the European Research Council (Grant agreement ID: 101088049) and located at the Centre for Asian and Transcultural Studies, Heidelberg University."
  [languages.zh]
    languageName = "中文"
    weight = 2

[markup.goldmark.renderer]
  unsafe = true

[params]
  colorScheme = "fire"
  defaultAppearance = "light"
  autoSwitchAppearance = true
  enableA11y = true
  
  [params.header]
    layout = "fixed"
    logo = "logo.png"
    showLanguageSelector = true

  [params.homepage]
    layout = "background"
    showRecent = true
    showRecentItems = 6
    showMoreLink = true
    cardView = true
    layoutBackgroundBlur = true
    homepageImage = "background.png"

  [params.article]
    layout = "basic"
    showDate = true
    showReadingTime = true

  [params.list]
    layout = "card"

  [params.footer]
    showCopyright = true
    showScrollToTop = true
    showAppearanceSwitcher = true